name: Docs Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  broken-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Mintlify CLI
        run: npm install -g mintlify

      - name: Check broken links
        run: npx --yes mintlify broken-links

  internal-route-style:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject relative .md links in docs content
        run: |
          if rg -n '\]\((\./|\.\./)[^)]*\.md\)' \
            index.md \
            admin-guide \
            architecture \
            deployment \
            getting-started \
            guides \
            open-source \
            reference; then
            echo "Use Mintlify route paths like /guides/configuration instead of relative .md links."
            exit 1
          fi

  markdown-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check markdown links
        run: find . -name '*.md' -print0 | xargs -0 -n 1 npx -y markdown-link-check --config .github/markdown-link-check.json
